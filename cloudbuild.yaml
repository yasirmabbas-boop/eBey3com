steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/${PROJECT_ID}/ebey3-backend:${SHORT_SHA}"
      - -t
      - "gcr.io/${PROJECT_ID}/ebey3-backend:latest"
      - .

  # Step 2: Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "gcr.io/${PROJECT_ID}/ebey3-backend"

  # Step 3: Deploy the pre-built image to Cloud Run (preserves existing env vars)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ebey3-backend
      - --image=gcr.io/${PROJECT_ID}/ebey3-backend:${SHORT_SHA}
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=${PROJECT_ID}:us-central1:ebey3-main-db

images:
  - "gcr.io/${PROJECT_ID}/ebey3-backend:${SHORT_SHA}"
  - "gcr.io/${PROJECT_ID}/ebey3-backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
